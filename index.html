  <script type="text/babel" data-presets="react">
// Mode 5: Periodic Mender — puzzle game with timer

function buildPositionMap() {
  const map = {};
  ELEMENTS.forEach(el => { map[el.n] = { row: el.row, col: el.col }; });
  return map;
}

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const audioCtx = typeof AudioContext !== "undefined" ? new AudioContext() : null;

function playCorrectSound() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.type = "sine";
  osc.frequency.setValueAtTime(523, audioCtx.currentTime);
  osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.08);
  osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.16);
  gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
  osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + 0.4);
}

function playWrongSound() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.type = "square";
  osc.frequency.setValueAtTime(200, audioCtx.currentTime);
  osc.frequency.setValueAtTime(150, audioCtx.currentTime + 0.12);
  gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
  osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + 0.3);
}

function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return `${m}:${s < 10 ? "0" : ""}${s}`;
}

function PuzzleGame() {
  const posMap = React.useMemo(() => buildPositionMap(), []);
  const [difficulty, setDifficulty] = React.useState(() => localStorage.getItem("ptPuzzleDiff") || "first20");

  // Determine which elements are in play for the chosen difficulty
  const activeElements = React.useMemo(() => {
    if (difficulty === "first20") return ELEMENTS.filter(e => e.n <= 20);
    if (difficulty === "nofblock") return ELEMENTS.filter(e => e.block !== "f");
    return ELEMENTS; // "all"
  }, [difficulty]);

  const [placed, setPlaced] = React.useState({});
  const [remaining, setRemaining] = React.useState(() => shuffleArray(activeElements));
  const [score, setScore] = React.useState(0);
  const [feedback, setFeedback] = React.useState(null);
  const [draggingN, setDraggingN] = React.useState(null);
  const [timerRunning, setTimerRunning] = React.useState(false);
  const [elapsed, setElapsed] = React.useState(0);
  const timerRef = React.useRef(null);

  // When difficulty changes, reset the game
  React.useEffect(() => {
    localStorage.setItem("ptPuzzleDiff", difficulty);
    if (timerRef.current) { clearInterval(timerRef.current); timerRef.current = null; }
    setPlaced({});
    setRemaining(shuffleArray(activeElements));
    setScore(0);
    setFeedback(null);
    setElapsed(0);
    setTimerRunning(false);
  }, [difficulty, activeElements]);

  const startTimer = () => {
    if (timerRef.current) return;
    setTimerRunning(true);
    timerRef.current = setInterval(() => setElapsed(t => t + 1), 1000);
  };

  const stopTimer = () => {
    if (timerRef.current) { clearInterval(timerRef.current); timerRef.current = null; }
    setTimerRunning(false);
  };

  const reset = () => {
    stopTimer();
    setPlaced({});
    setRemaining(shuffleArray(activeElements));
    setScore(0);
    setFeedback(null);
    setElapsed(0);
  };

  React.useEffect(() => { return () => { if (timerRef.current) clearInterval(timerRef.current); }; }, []);

  const handleDrop = (row, col, atomicNum) => {
    if (!timerRunning && Object.keys(placed).length === 0) startTimer();
    const el = ELEMENTS.find(e => e.n === atomicNum);
    if (!el) return;
    const correct = posMap[atomicNum];
    if (correct.row === row && correct.col === col) {
      playCorrectSound();
      const newPlaced = { ...placed, [`${row}-${col}`]: el };
      setPlaced(newPlaced);
      const newRemaining = remaining.filter(e => e.n !== atomicNum);
      setRemaining(newRemaining);
      setScore(s => s + 1);
      setFeedback({ row, col, type: "correct" });
      setTimeout(() => setFeedback(f => f && f.row === row && f.col === col ? null : f), 800);
      if (newRemaining.length === 0) stopTimer();
    } else {
      playWrongSound();
      setFeedback({ row, col, type: "wrong" });
      setTimeout(() => setFeedback(f => f && f.row === row && f.col === col ? null : f), 800);
    }
  };

  const mainRows = [1,2,3,4,5,6,7];
  const cols = Array.from({length: 18}, (_, i) => i + 1);
  const allDone = remaining.length === 0;
  const showFBlock = difficulty !== "first20" && difficulty !== "nofblock";
  const visibleRows = difficulty === "first20" ? [1,2,3,4] : mainRows;

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
        <div>
          <div style={{ fontSize: 11, fontWeight: 700, color: "#3a7ac2", textTransform: "uppercase", letterSpacing: 1.4 }}>Mode 5 · Periodic Mender</div>
          <div style={{ fontSize: 18, fontWeight: 700, color: "#1a1a1a", marginTop: 2 }}>Rebuild the periodic table!</div>
          <div style={{ fontSize: 12, color: "#6a6456", marginTop: 4, maxWidth: 600, lineHeight: 1.5 }}>
            The periodic table has been shattered! Drag each element from the pool on the right to its correct position in the table.
            A correct placement earns a point and locks the element in place. An incorrect placement bounces the element back.
          </div>
          <div style={{ display: "flex", gap: 6, marginTop: 10, alignItems: "center" }}>
            <div style={{ fontSize: 10, fontWeight: 700, color: "#6a6456", textTransform: "uppercase", letterSpacing: 1, marginRight: 4 }}>Difficulty</div>
            {[
              { k: "first20", label: "First 20", sub: "H → Ca" },
              { k: "nofblock", label: "No f-block", sub: "118 − lanthanides/actinides" },
              { k: "all",      label: "All 118",  sub: "Full table" },
            ].map(d => {
              const active = difficulty === d.k;
              return (
                <button key={d.k} onClick={() => setDifficulty(d.k)} style={{
                  padding: "6px 12px", borderRadius: 4, cursor: "pointer", fontFamily: "inherit",
                  background: active ? "#3a7ac2" : "#fff",
                  color: active ? "#fff" : "#3a352a",
                  border: active ? "1px solid #2a5a9a" : "1px solid #c8bfa8",
                  fontSize: 12, fontWeight: active ? 700 : 500, textAlign: "left", lineHeight: 1.2,
                }}>
                  <div>{d.label}</div>
                  <div style={{ fontSize: 9, opacity: 0.75, fontWeight: 400, marginTop: 1 }}>{d.sub}</div>
                </button>
              );
            })}
          </div>
        </div>
        <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 6 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
            <div style={{
              fontSize: 20, fontWeight: 700, fontFamily: "'JetBrains Mono', monospace",
              color: timerRunning ? "#3a7ac2" : allDone ? "#2a7a4a" : "#8a8370",
              background: "#f5f2ec", padding: "4px 12px", borderRadius: 6, border: "1px solid #e0d9c8",
              minWidth: 70, textAlign: "center",
            }}>
              {formatTime(elapsed)}
            </div>
            <div style={{ fontSize: 15, fontWeight: 700, color: "#22201b" }}>
              <span style={{ color: "#2a7a4a" }}>{score}</span>
              <span style={{ opacity: 0.5 }}> / {activeElements.length}</span>
            </div>
            <button onClick={reset} style={puzzleBtnStyle}>Reset</button>
          </div>
        </div>
      </div>

      {allDone && (
        <div style={{ padding: "14px 20px", background: "#e6f5ec", border: "1px solid #6a9a55", borderRadius: 8, marginBottom: 10, fontSize: 16, fontWeight: 700, color: "#29491a", textAlign: "center" }}>
          Congratulations! You mended the periodic table in <span style={{ color: "#3a7ac2" }}>{formatTime(elapsed)}</span>!
        </div>
      )}

      <div style={{ display: "grid", gridTemplateColumns: "1fr 280px", gap: 12, alignItems: "start" }}>
        {/* Scaled-down periodic table */}
        <div style={{ background: "#fbf9f3", padding: 8, borderRadius: 8, border: "1px solid #e5e1d9" }}>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(18, minmax(0, 1fr))", gap: 1.5, marginBottom: 1.5 }}>
            {cols.map(c => (
              <div key={c} style={{ textAlign: "center", fontSize: 8, fontWeight: 600, color: "#8a8370" }}>{c}</div>
            ))}
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(18, minmax(0, 1fr))", gap: 1.5 }}>
            {visibleRows.map(row =>
              cols.map(col => {
                const key = `${row}-${col}`;
                const placedEl = placed[key];
                const hasSlot = activeElements.some(e => e.row === row && e.col === col);
                const fb = feedback && feedback.row === row && feedback.col === col ? feedback.type : null;
                if (!hasSlot) return <div key={key} style={{ aspectRatio: "1" }} />;
                return <PuzzleSlot key={key} row={row} col={col} placedEl={placedEl} fb={fb} onDrop={(n) => handleDrop(row, col, n)} />;
              })
            )}
          </div>
          {showFBlock && (
            <>
              <div style={{ height: 5 }} />
              <div style={{ display: "grid", gridTemplateColumns: "repeat(18, minmax(0, 1fr))", gap: 1.5 }}>
                {cols.map(col => {
                  const row = 9; const key = `${row}-${col}`;
                  const placedEl = placed[key];
                  const hasSlot = activeElements.some(e => e.row === row && e.col === col);
                  const fb = feedback && feedback.row === row && feedback.col === col ? feedback.type : null;
                  if (!hasSlot) return <div key={key} style={{ aspectRatio: "1" }} />;
                  return <PuzzleSlot key={key} row={row} col={col} placedEl={placedEl} fb={fb} onDrop={(n) => handleDrop(row, col, n)} />;
                })}
              </div>
              <div style={{ height: 1.5 }} />
              <div style={{ display: "grid", gridTemplateColumns: "repeat(18, minmax(0, 1fr))", gap: 1.5 }}>
                {cols.map(col => {
                  const row = 10; const key = `${row}-${col}`;
                  const placedEl = placed[key];
                  const hasSlot = activeElements.some(e => e.row === row && e.col === col);
                  const fb = feedback && feedback.row === row && feedback.col === col ? feedback.type : null;
                  if (!hasSlot) return <div key={key} style={{ aspectRatio: "1" }} />;
                  return <PuzzleSlot key={key} row={row} col={col} placedEl={placedEl} fb={fb} onDrop={(n) => handleDrop(row, col, n)} />;
                })}
              </div>
            </>
          )}
        </div>

        {/* Side panel */}
        <div style={{
          background: "#fbf9f3", borderRadius: 8, border: "1px solid #e5e1d9",
          padding: 8, maxHeight: "75vh", overflowY: "auto",
        }}>
          <div style={{ fontSize: 10, fontWeight: 700, color: "#6a6456", textTransform: "uppercase", letterSpacing: 1, marginBottom: 6, textAlign: "center" }}>
            Elements ({remaining.length} left)
          </div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 3, justifyContent: "center" }}>
            {remaining.map(el => (
              <DraggableElement key={el.n} el={el} small onDragStart={() => setDraggingN(el.n)} onDragEnd={() => setDraggingN(null)} />
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function PuzzleSlot({ row, col, placedEl, fb, onDrop }) {
  const [over, setOver] = React.useState(false);
  const c = placedEl ? (CAT_COLORS[placedEl.cat] || CAT_COLORS.nonmetal) : null;

  return (
    <div
      onDragOver={(e) => { if (!placedEl) { e.preventDefault(); setOver(true); } }}
      onDragLeave={() => setOver(false)}
      onDrop={(e) => {
        e.preventDefault(); setOver(false);
        if (placedEl) return;
        const n = parseInt(e.dataTransfer.getData("element-n"));
        if (!isNaN(n)) onDrop(n);
      }}
      style={{
        aspectRatio: "1",
        background: placedEl ? c.bg : over ? "#e8f0ff" : "#fff",
        border: placedEl ? `1px solid ${c.bd}` : over ? "1.5px dashed #3a7ac2" : "1px solid #d8d2c4",
        borderRadius: 2,
        display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
        position: "relative", transition: "background 0.15s", overflow: "hidden",
      }}
    >
      {placedEl && (
        <>
          <div style={{ fontSize: 6, opacity: 0.7, color: c.tx }}>{placedEl.n}</div>
          <div style={{ fontSize: 10, fontWeight: 700, color: c.tx, lineHeight: 1 }}>{placedEl.sym}</div>
          <div style={{ fontSize: 5, opacity: 0.7, color: c.tx }}>{placedEl.name.toLowerCase()}</div>
        </>
      )}
      {fb === "correct" && (
        <div style={{
          position: "absolute", inset: 0, background: "rgba(42, 122, 74, 0.25)",
          display: "flex", alignItems: "center", justifyContent: "center",
          fontSize: 16, color: "#2a7a4a", animation: "puzzle-fade 0.8s forwards",
        }}>✓</div>
      )}
      {fb === "wrong" && (
        <div style={{
          position: "absolute", inset: 0, background: "rgba(200, 50, 50, 0.2)",
          display: "flex", alignItems: "center", justifyContent: "center",
          fontSize: 16, color: "#c03030", animation: "puzzle-fade 0.8s forwards",
        }}>✗</div>
      )}
    </div>
  );
}

function DraggableElement({ el, onDragStart, onDragEnd, small }) {
  const c = CAT_COLORS[el.cat] || CAT_COLORS.nonmetal;
  const sz = small ? 36 : 42;
  return (
    <div
      draggable
      onDragStart={(e) => {
        e.dataTransfer.setData("element-n", String(el.n));
        e.dataTransfer.effectAllowed = "move";
        onDragStart();
      }}
      onDragEnd={onDragEnd}
      style={{
        width: sz, height: sz,
        background: c.bg, border: `1px solid ${c.bd}`, borderRadius: 3,
        display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
        cursor: "grab", userSelect: "none", padding: 1,
      }}
      title={el.name}
    >
      <div style={{ fontSize: 6, opacity: 0.7, color: c.tx }}>{el.n}</div>
      <div style={{ fontSize: small ? 10 : 12, fontWeight: 700, color: c.tx, lineHeight: 1 }}>{el.sym}</div>
      <div style={{ fontSize: 5, opacity: 0.7, color: c.tx }}>{el.name.toLowerCase()}</div>
    </div>
  );
}

const puzzleBtnStyle = {
  padding: "6px 14px", background: "#fff", border: "1px solid #c8bfa8",
  borderRadius: 4, fontSize: 12, fontWeight: 500, cursor: "pointer",
  color: "#3a352a", fontFamily: "inherit",
};

window.PuzzleGame = PuzzleGame;

  </script>
  <script type="text/babel" data-presets="react">
// Main app
const { useState: useSt, useEffect: useEf } = React;

const MODES = [
  { id: "explore",  label: "1 · Elements Explorer",  sub: "Facts, uses & properties" },
  { id: "dotcross", label: "2 · Dot-and-Cross",      sub: "Electronic structure diagrams" },
  { id: "lab",      label: "3 · Group Lab",          sub: "Group 1 & 17 reactions" },
  { id: "history",  label: "4 · History",            sub: "Discovery stories on aged paper" },
  { id: "compound", label: "5 · Periodic Mender",    sub: "Rebuild the table against the clock" },
];

function App() {
  const [mode, setMode] = useSt(() => localStorage.getItem("ptMode") || "explore");
  const [selected, setSelected] = useSt(null);
  const [labGroup, setLabGroup] = useSt(null);

  useEf(() => { localStorage.setItem("ptMode", mode); }, [mode]);
  useEf(() => { setSelected(null); setLabGroup(null); }, [mode]);

  const selectedEl = selected != null ? ELEMENTS.find(e => e.n === selected) : null;

  // Mode 3: which elements are selectable on the overview table
  // Hydrogen is in group 1 by atomic number but is not an alkali metal — exclude it.
  const labEnabled = (el) => (el.group === 1 && el.sym !== "H") || el.group === 17 || el.group === 18 || el.cat === "transition";

  const handleSelect = (el) => {
    if (mode === "lab") {
      if (el.group === 1 && el.sym !== "H") setLabGroup("g1");
      else if (el.group === 17) setLabGroup("g17");
      else if (el.group === 18) setLabGroup("g18");
      else if (el.cat === "transition") setLabGroup("tm");
      return;
    }
    setSelected(el.n);
  };

  return (
    <div style={{ maxWidth: 1400, margin: "0 auto", padding: "20px 24px 40px" }}>
      <Header />
      <ModeTabs mode={mode} setMode={setMode} />

      {mode === "explore" && (
        <TwoPane rightWidth={340}>
          <PeriodicTable onSelect={handleSelect} selected={selected} />
          <InfoPanel el={selectedEl} />
        </TwoPane>
      )}

      {mode === "dotcross" && (
        <TwoPane rightWidth={340}>
          <PeriodicTable onSelect={handleSelect} selected={selected} />
          <DotCrossPanel el={selectedEl} />
        </TwoPane>
      )}

      {mode === "lab" && (
        <div>
          {!labGroup && (
            <div>
              <div style={{ marginBottom: 10, fontSize: 13, color: "#6a6456" }}>
                Click an element from <b>Group 1</b> (alkali metals), <b>Group 17</b> (halogens), <b>Group 18</b> (noble gases), or a <b>transition metal</b> (Groups 3–12) to open its lab.
              </div>
              <PeriodicTable onSelect={handleSelect} selected={null} isEnabled={labEnabled} />
              <Legend />
            </div>
          )}
          {labGroup === "g1" && (
            <div>
              <BackBtn onClick={() => setLabGroup(null)} />
              <Group1Lab />
            </div>
          )}
          {labGroup === "g17" && (
            <div>
              <BackBtn onClick={() => setLabGroup(null)} />
              <Group17Lab />
            </div>
          )}
          {labGroup === "g18" && (
            <div>
              <BackBtn onClick={() => setLabGroup(null)} />
              <Group18Lab />
            </div>
          )}
          {labGroup === "tm" && (
            <div>
              <BackBtn onClick={() => setLabGroup(null)} />
              <TransitionMetalsLab />
            </div>
          )}
        </div>
      )}

      {mode === "history" && (
        <TwoPane>
          <PeriodicTable onSelect={handleSelect} selected={selected} variant="aged" />
          <HistoryPanel el={selectedEl} />
        </TwoPane>
      )}

      {mode === "compound" && (
        <PuzzleGame />
      )}

      <Footer />
    </div>
  );
}

function Header() {
  return (
    <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", marginBottom: 14, paddingBottom: 12, borderBottom: "1px solid #e8e2d4" }}>
      <div>
        <div style={{ fontSize: 11, fontWeight: 700, color: "#8a7a5a", letterSpacing: 2, textTransform: "uppercase" }}>Interactive Chemistry</div>
        <div style={{ fontSize: 26, fontWeight: 700, color: "#1a1a1a", letterSpacing: -0.5, marginTop: 2 }}>The Periodic Table</div>
      </div>
      <div style={{ fontSize: 11, color: "#8a7a5a", fontFamily: "'JetBrains Mono', monospace" }}>
        118 elements · 5 modes
      </div>
      <div style={{ fontSize: 11, color: "#8a7a5a", fontFamily: "'JetBrains Mono', monospace", marginTop: 2 }}>
        ZJ Cher, 2026
      </div>
    </div>
  );
}

function ModeTabs({ mode, setMode }) {
  return (
    <div style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: 6, marginBottom: 18 }}>
      {MODES.map(m => {
        const active = m.id === mode;
        return (
          <button key={m.id} onClick={() => setMode(m.id)} style={{
            padding: "10px 12px",
            background: active ? "#22201b" : "#fffdf8",
            color: active ? "#fbf9f3" : "#3a352a",
            border: active ? "1px solid #22201b" : "1px solid #e0d9c8",
            borderRadius: 6,
            cursor: "pointer",
            textAlign: "left",
            fontFamily: "inherit",
            transition: "all 0.15s",
          }}>
            <div style={{ fontSize: 12, fontWeight: 700 }}>{m.label}</div>
            <div style={{ fontSize: 10.5, opacity: active ? 0.7 : 0.6, marginTop: 2 }}>{m.sub}</div>
          </button>
        );
      })}
    </div>
  );
}

function TwoPane({ children, rightWidth = 420 }) {
  return (
    <div style={{ display: "grid", gridTemplateColumns: `1fr ${rightWidth}px`, gap: 18, alignItems: "start" }}>
      <div>{children[0]}<Legend /></div>
      <div style={{ position: "sticky", top: 20 }}>{children[1]}</div>
    </div>
  );
}

function Legend() {
  const items = Object.keys(CAT_LABELS);
  return (
    <div style={{ marginTop: 10, display: "flex", flexWrap: "wrap", gap: 8 }}>
      {items.map(k => {
        const c = CAT_COLORS[k];
        return (
          <div key={k} style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 10.5, color: "#3a352a" }}>
            <span style={{ width: 10, height: 10, background: c.bg, border: `1.5px solid ${c.bd}`, borderRadius: 2 }} />
            {CAT_LABELS[k]}
          </div>
        );
      })}
    </div>
  );
}

function BackBtn({ onClick }) {
  const btnStyle = {
    padding: "6px 14px", background: "#fff", border: "1px solid #c8bfa8",
    borderRadius: 4, fontSize: 12, fontWeight: 500, cursor: "pointer",
    color: "#3a352a", fontFamily: "inherit",
  };
  return (
    <button onClick={onClick} style={{
      ...btnStyle, marginBottom: 10, display: "inline-flex", alignItems: "center", gap: 6,
    }}>
      ← Back to group selection
    </button>
  );
}

function Footer() {
  return (
    <div style={{ marginTop: 40, padding: "14px 0 0", borderTop: "1px solid #e8e2d4", fontSize: 11, color: "#8a7a5a", display: "flex", justifyContent: "space-between" }}>
      <div>An interactive chemistry teaching tool.</div>
      <div>Tip: press the mode tabs above to switch between activities.</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

  </script>
</body>
</html>
